<!DOCTYPE html>
<html>
<head>
    <title>ssec-Sentinel</title>
    <style>
        body { font-family: Arial; background: #0a0f1e; color: white; margin: 0; padding: 20px; }
        .header { background: #1a1f2f; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #1a1f2f; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2em; color: #ff4444; font-weight: bold; }
        .eth-address { background: linear-gradient(135deg, #2a1f3a, #1a2f3a); padding: 15px; border-radius: 10px; font-family: monospace; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 ssec-Sentinel</h1>
        <p>Emergency Intelligence Platform</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="conflict-count">-</div>
            <div>Active Conflicts</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="api-status">-</div>
            <div>API Status</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="version">0.3.0</div>
            <div>Version</div>
        </div>
    </div>

    <div class="eth-address">
        <div>Support the Network</div>
        <code style="color: #8844ff; font-size: 1.2em;">0x8242f0f25c5445F7822e80d3C9615e57586c6639</code>
        <button onclick="copyAddress()" style="background: #8844ff; color: white; border: none; padding: 5px 15px; border-radius: 5px; margin-top: 10px; cursor: pointer;">Copy Address</button>
    </div>

    <script>
        // Copy ETH address
        window.copyAddress = function() {
            navigator.clipboard.writeText('0x8242f0f25c5445F7822e80d3C9615e57586c6639');
            alert('✅ Address copied!');
        };

        // Check API
        fetch('/api/health')
            .then(r => r.json())
            .then(data => {
                document.getElementById('api-status').innerText = '✅ Online';
                document.getElementById('api-status').style.color = '#4CAF50';
            })
            .catch(() => {
                document.getElementById('api-status').innerText = '❌ Offline';
                document.getElementById('api-status').style.color = '#ff4444';
            });

        // Get conflicts
        fetch('/api/conflicts')
            .then(r => r.json())
            .then(data => {
                document.getElementById('conflict-count').innerText = data.length;
            })
            .catch(() => {
                document.getElementById('conflict-count').innerText = '0';
            });
    </script>
</body>
</html>
